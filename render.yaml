services:
  # ─── 1. Backend API (NestJS) ──────────────────────────────────────────────
  - type: web
    name: dejenrewards-backend
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma generate --schema=./prisma/schema.prisma && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_MVeUsJk8j4RS@ep-broad-brook-an6n1ie8-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      - key: TELEGRAM_BOT_TOKEN
        value: "8878260053:AAFnUgkU_hjJRedU2SJq_a81proq7gwvB0U"
      - key: TELEGRAM_BOT_USERNAME
        value: "userdejenbot"
      - key: TELEGRAM_CHANNEL_ID
        value: "@userdejendejen"
      - key: ALLOWED_ORIGINS
        # actual mini-app + admin URLs on Render
        value: "https://telegrambot-1-b7u3.onrender.com,https://telegrambot-dppa.onrender.com,https://dejenrewards-miniapp.onrender.com,https://dejenrewards-admin.onrender.com"

  # ─── 2. Admin Dashboard (Next.js) ────────────────────────────────────────
  - type: web
    name: dejenrewards-admin
    env: node
    region: oregon
    rootDir: admin-dashboard
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_PUBLIC_BACKEND_URL
        # backend service URL (not the bot URL)
        value: "https://telegrambot-backend-37gb.onrender.com"

  # ─── 3. Telegram Bot (Web Service with long-polling + health-check) ──────────
  - type: web
    name: dejenrewards-bot
    env: node
    region: oregon
    rootDir: bot
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        value: "8878260053:AAFnUgkU_hjJRedU2SJq_a81proq7gwvB0U"
      - key: TELEGRAM_BOT_USERNAME
        value: "userdejenbot"
      - key: TELEGRAM_CHANNEL_ID
        value: "@userdejendejen"
      - key: BACKEND_URL
        # backend service URL (not the bot's own URL)
        value: "https://telegrambot-backend-37gb.onrender.com"
      - key: MINI_APP_URL
        # direct Render URL — avoids BUTTON_URL_INVALID from t.me/bot/app shortlink
        value: "https://telegrambot-1-b7u3.onrender.com"

  # ─── 4. Mini App (Vite Static Site) ──────────────────────────────────────
  - type: static
    name: dejenrewards-miniapp
    region: oregon
    rootDir: mini-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        # backend service URL (not the bot URL)
        value: "https://telegrambot-backend-37gb.onrender.com"
      - key: VITE_BOT_USERNAME
        value: "userdejenbot"
